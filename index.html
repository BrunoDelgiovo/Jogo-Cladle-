<!DOCTYPE html>

<head>
  <meta charset="UTF-8">
  <title>Cladle</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://d3js.org/d3.v7.min.js"></script>

</head>

<body>
  <div id="won"></div>
  <div id="guesses"></div>
  <div class="autocomplete">
    <input id="speciesA" placeholder="Write down a species" autocomplete="off">
    <div id="speciesSuggestions" class="suggestions"></div>
  </div>

  <button id="guessBtn">Guess</button>
  <p id="comparisonResult"></p>
  

  <script type="module" src="index.js"></script>

  <aside id="wikiPanel">
  <h3 id="wikiTitle">Hover a clade</h3>
  <img id="wikiImg" alt="">
  <p id="wikiExtract">Move your mouse over a clade name to see its Wikipedia summary.</p>
  <a id="wikiLink" target="_blank" rel="noopener" style="display:none;">Open on Wikipedia</a>
</aside>



  <div id="tree">
  <svg id="treeSvg" width="1200" height="600"></svg>
  </div>



</body>
